name: Build APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

env:
  ENGINE_REPO: https://github.com/schwabe/ics-openvpn.git
  ENGINE_TAG: v0.7.51

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK + CMake + SWIG
        run: |
          set -e
          sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"
          sudo apt-get update -qq
          sudo apt-get install -y swig
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> "$GITHUB_ENV"

      # STEP 1: Build the OpenVPN engine INSIDE ITS OWN PROJECT.
      # This is the crucial fix: its gradle/libs.versions.toml (the "libs"
      # catalog) only resolves when the engine is built as its own project,
      # not when its folder is grafted into ours.
      - name: Build OpenVPN engine .aar
        run: |
          set -e
          git clone --depth 1 --branch "$ENGINE_TAG" --recurse-submodules --shallow-submodules \
            "$ENGINE_REPO" ics-openvpn
          cd ics-openvpn
          chmod +x gradlew
          # Build only the engine library module in release form.
          ./gradlew :main:assembleRelease --no-daemon --stacktrace
          echo "---- produced AARs ----"
          find main/build/outputs/aar -name '*.aar'

      # STEP 2: Hand the finished .aar to our app as app/libs/openvpn.aar.
      - name: Stage engine .aar for the app
        run: |
          set -e
          mkdir -p app/libs
          AAR=$(find ics-openvpn/main/build/outputs/aar -name '*release*.aar' | head -n1)
          if [ -z "$AAR" ]; then AAR=$(find ics-openvpn/main/build/outputs/aar -name '*.aar' | head -n1); fi
          cp "$AAR" app/libs/openvpn.aar
          echo "Staged: $AAR -> app/libs/openvpn.aar"
          ls -la app/libs

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"
          cache-disabled: true

      # STEP 3: Build our app; it consumes app/libs/openvpn.aar.
      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiVPN-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
